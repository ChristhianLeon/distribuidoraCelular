<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctanos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<section class="bg-white dark:bg-gray-900">
        <div class="container px-6 py-12 mx-auto">
            
            <!-- Encabezado central -->
            <div class="text-center">
                <p class="font-medium text-blue-500 dark:text-blue-400">Contáctanos</p>
                <h1 class="mt-2 text-2xl font-semibold text-gray-800 md:text-3xl dark:text-white">Estamos aquí para ayudarte a elegir tu próximo celular</h1>
                <p class="mt-3 text-gray-500 dark:text-gray-400">Nuestro equipo de expertos está listo para asesorarte.</p>
            </div>

            <!-- Contenedor Flex: Divide la pantalla en 2 columnas en PC -->
            <div class="lg:flex lg:items-start lg:-mx-6 mt-10">
                
                <!-- Columna Izquierda: Imagen y Tarjetas -->
                <div class="lg:w-1/2 lg:mx-6">
                    <img class="object-cover w-full h-64 rounded-lg lg:h-80" src="https://images.unsplash.com/photo-1568992688065-536aad8a12f6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1632&q=100" alt="Atención al cliente">
                    
                    <div class="grid grid-cols-1 gap-8 mt-8 sm:grid-cols-2">
                        <!-- Tarjeta 1: Ventas -->
                        <div class="p-4 rounded-lg bg-blue-50 md:p-6 dark:bg-gray-800">
                            <span class="inline-block p-3 text-blue-500 rounded-lg bg-blue-100/80 dark:bg-gray-700">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                                </svg>
                            </span>
                            <h2 class="mt-4 text-base font-medium text-gray-800 dark:text-white">Ventas y Asesoría</h2>
                            <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Av. Naciones Unidas y Shyris</p>
                            <p class="mt-2 text-sm text-blue-500 dark:text-blue-400">ventas@tucelular.com.ec</p>
                        </div>

                        <!-- Tarjeta 2: Llámanos -->
                        <div class="p-4 rounded-lg bg-blue-50 md:p-6 dark:bg-gray-800">
                            <span class="inline-block p-3 text-blue-500 rounded-lg bg-blue-100/80 dark:bg-gray-700">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
                                </svg>
                            </span>
                            <h2 class="mt-4 text-base font-medium text-gray-800 dark:text-white">Llámanos</h2>
                            <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Lunes a Sábado: 9am - 7pm</p>
                            <p class="mt-2 text-sm text-blue-500 dark:text-blue-400">+593 99 000 0000</p>
                        </div>
                    </div>
                </div>

                <!-- Columna Derecha: Formulario -->
                <div class="mt-8 lg:w-1/2 lg:mx-6 lg:mt-0">
                    <div class="w-full px-8 py-10 mx-auto overflow-hidden bg-white rounded-lg shadow-2xl dark:bg-gray-900 lg:max-w-xl shadow-gray-300/50 dark:shadow-black/50">
                        <h2 class="text-lg font-medium text-gray-700 dark:text-white">¿Qué modelo buscas o qué duda tienes?</h2>

                        <form class="mt-6">
                            <div class="flex-1">
                                <label class="block mb-2 text-sm text-gray-600 dark:text-gray-200">Nombre Completo</label>
                                <input type="text" placeholder="Cristian León" class="block w-full px-5 py-3 mt-2 text-gray-700 placeholder-gray-400 bg-white border border-gray-200 rounded-md dark:placeholder-gray-600 dark:bg-gray-900 dark:text-gray-300 dark:border-gray-700 focus:border-blue-400 dark:focus:border-blue-400 focus:ring-blue-400 focus:outline-none focus:ring focus:ring-opacity-40" />
                            </div>

                            <div class="flex-1 mt-6">
                                <label class="block mb-2 text-sm text-gray-600 dark:text-gray-200">Correo Electrónico</label>
                                <input type="email" placeholder="cristian@ejemplo.com" class="block w-full px-5 py-3 mt-2 text-gray-700 placeholder-gray-400 bg-white border border-gray-200 rounded-md dark:placeholder-gray-600 dark:bg-gray-900 dark:text-gray-300 dark:border-gray-700 focus:border-blue-400 dark:focus:border-blue-400 focus:ring-blue-400 focus:outline-none focus:ring focus:ring-opacity-40" />
                            </div>

                            <div class="w-full mt-6">
                                <label class="block mb-2 text-sm text-gray-600 dark:text-gray-200">Mensaje</label>
                                <textarea class="block w-full h-32 px-5 py-3 mt-2 text-gray-700 placeholder-gray-400 bg-white border border-gray-200 rounded-md md:h-48 dark:placeholder-gray-600 dark:bg-gray-900 dark:text-gray-300 dark:border-gray-700 focus:border-blue-400 dark:focus:border-blue-400 focus:ring-blue-400 focus:outline-none focus:ring focus:ring-opacity-40" placeholder="Ej. Me interesa cotizar un iPhone 15 Pro Max o un Samsung S24..."></textarea>
                            </div>

                            <button class="w-full px-6 py-3 mt-6 text-sm font-medium tracking-wide text-white capitalize transition-colors duration-300 transform bg-blue-500 rounded-md hover:bg-blue-400 focus:outline-none focus:ring focus:ring-blue-300 focus:ring-opacity-50">
                                Enviar Mensaje
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </section>
    



    
    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
